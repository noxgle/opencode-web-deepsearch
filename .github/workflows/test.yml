name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install ddgs beautifulsoup4 requests aiohttp lxml

      - name: Install OpenCode
        run: curl -L https://opencode.ai/install | bash

      - name: Install plugin from npm
        run: npm install opencode-web-deepsearch --legacy-peer-deps

      - name: Create opencode.json with plugin
        run: |
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "lsp": false,
            "formatter": false,
            "tui": false,
            "plugin": ["opencode-web-deepsearch"]
          }
          EOF

      - name: Verify plugin structure
        run: |
          ls -la node_modules/opencode-web-deepsearch/
          ls -la node_modules/opencode-web-deepsearch/scripts/

      - name: Test tool execution (simulating OpenCode context)
        run: |
          python3 node_modules/opencode-web-deepsearch/scripts/WebSearchAgent.py --query "OpenCode test" --max-sources 1 --deep-search false > tool_output.json
          cat tool_output.json
          python3 -c "import json; d=json.load(open('tool_output.json')); print('Query:', d['query']); print('Sources:', d['source_count'])"
          echo "E2E via OpenCode plugin context PASSED"