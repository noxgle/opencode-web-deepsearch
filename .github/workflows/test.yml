name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install ddgs beautifulsoup4 requests aiohttp lxml

      - name: Install OpenCode
        run: |
          curl -L https://opencode.ai/install | bash

      - name: Install plugin from npm
        run: npm install opencode-web-deepsearch --legacy-peer-deps

      - name: Create opencode.json with plugin
        run: |
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "lsp": false,
            "formatter": false,
            "tui": false,
            "plugin": ["opencode-web-deepsearch"]
          }
          EOF

      - name: Create test script that uses plugin
        run: |
          mkdir -p test-scripts
          cat > test-scripts/call_tool.ts << 'EOF'
          import { tool } from "@opencode-ai/plugin"
          import path from "path"

          // Get the plugin directory
          const pluginDir = path.join(process.cwd(), "node_modules", "opencode-web-deepsearch")
          const scriptPath = path.join(pluginDir, "scripts", "WebSearchAgent.py")

          export default tool({
            description: "Test tool that runs WebSearchAgent",
            args: {
              query: tool.schema.string().describe("Search query"),
            },
            async execute(args) {
              const { Bun } = await import("bun")
              const result = await Bun.$`python3 ${scriptPath} --query ${args.query} --max-sources 1 --deep-search false`.text()
              return result.trim()
            },
          })
          EOF

      - name: Test plugin loads and tool runs
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          
          echo "=== Testing plugin structure ==="
          ls -la node_modules/opencode-web-deepsearch/
          ls -la node_modules/opencode-web-deepsearch/scripts/
          
          echo "=== Running tool via Python ==="
          python3 node_modules/opencode-web-deepsearch/scripts/WebSearchAgent.py --query "OpenCode" --max-sources 1 --deep-search false > tool_output.json
          
          echo "=== Tool output ==="
          cat tool_output.json
          
          echo "=== Validating output ==="
          python3 -c "
import json
with open('tool_output.json') as f:
    data = json.load(f)
print('Query:', data.get('query'))
print('Sources:', data.get('source_count'))
print('Iterations:', data.get('iterations_used'))
if 'sources' in data:
    print('SUCCESS: Plugin tool executed in OpenCode context!')
else:
    print('ERROR: No sources in response')
"
          
          echo "=== E2E TEST PASSED ==="

      - name: Summary
        run: |
          echo ""
          echo "=========================================="
          echo "Plugin loaded and executed via OpenCode!"
          echo "=========================================="