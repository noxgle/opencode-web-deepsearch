name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install ddgs beautifulsoup4 requests aiohttp lxml

      - name: Run Python script test
        run: |
          python3 scripts/WebSearchAgent.py --query "TypeScript 5.x features" --max-sources 1 --deep-search false